<svg xmlns="http://www.w3.org/2000/svg" viewBox="-76 -88 158 176" width="200" height="200">
  <defs>
    <radialGradient id="redGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="60%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="whiteGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8eef4"/>
    </radialGradient>
    <radialGradient id="glossTop" cx="45%" cy="20%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glossBot" cx="50%" cy="90%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="boltGloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#7f1d1d" flood-opacity="0.4"/>
    </filter>
    <clipPath id="ring">
      <path d="M0,0 m-68,0 a68,68 0 1,0 136,0 a68,68 0 1,0 -136,0
               M0,0 m-40,0 a40,40 0 1,1 80,0 a40,40 0 1,1 -80,0" fill-rule="evenodd"/>
    </clipPath>
    <clipPath id="outer">
      <circle cx="0" cy="0" r="68"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="0" cy="0" r="68" fill="url(#whiteGrad)"/>
    <g clip-path="url(#ring)">
      <path d="M0,0 L0,-80 A80,80 0 0,1 80,0 Z" fill="url(#redGrad)"/>
      <path d="M0,0 L0,80 A80,80 0 0,1 -80,0 Z" fill="url(#redGrad)"/>
      <path d="M0,0 L-80,0 A80,80 0 0,1 0,-80 Z" fill="url(#whiteGrad)"/>
      <path d="M0,0 L80,0 A80,80 0 0,1 0,80 Z" fill="url(#whiteGrad)"/>
    </g>
    <circle cx="0" cy="0" r="68" fill="none" stroke="#991b1b" stroke-width="3"/>
    <circle cx="0" cy="0" r="66" fill="none" stroke="rgba(255,100,100,0.4)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#991b1b" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="41.5" fill="none" stroke="rgba(255,150,150,0.3)" stroke-width="1"/>
    <line x1="-68" y1="0" x2="68" y2="0" stroke="#991b1b" stroke-width="2.5"/>
    <line x1="0" y1="-68" x2="0" y2="68" stroke="#991b1b" stroke-width="2.5"/>
    <line x1="-68" y1="-1" x2="68" y2="-1" stroke="rgba(255,180,180,0.35)" stroke-width="1"/>
    <line x1="-1" y1="-68" x2="-1" y2="68" stroke="rgba(255,180,180,0.35)" stroke-width="1"/>
    <path d="M5.5,-80 L-24.5,5 L0.5,5 L-24.5,80 L30.5,-2 L0.5,-2 Z"
      fill="url(#boltGrad)" stroke="#92400e" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M5.5,-80 L-24.5,5 L0.5,5 L-24.5,80 L30.5,-2 L0.5,-2 Z"
      fill="url(#boltGloss)" stroke="none"/>
    <g clip-path="url(#outer)">
      <ellipse cx="-10" cy="-28" rx="42" ry="28" fill="url(#glossTop)"/>
      <ellipse cx="5" cy="58" rx="35" ry="18" fill="url(#glossBot)"/>
    </g>
  </g>
</svg>
