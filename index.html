<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>救生員避雷地圖 Lifeguard Radar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛟</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- ★ Supabase SDK ★ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{
  --bg:#eef2f7;--surface:#fff;--surface2:#f3f7fb;--surface3:#e6eef7;
  --accent:#0891b2;--accent2:#0e7490;--accent-glow:rgba(8,145,178,.18);
  --text:#1a2e42;--text-muted:#6b8aab;--border:#c8d9eb;
  --topbar:rgba(238,242,247,.95);--shadow:rgba(0,30,70,.12);--overlay:rgba(90,120,160,.38);
  --input-bg:#f3f7fb;--popup-bg:#fff;--popup-border:#c8d9eb;
}
[data-theme="dark"]{
  --bg:#060d18;--surface:#0c1929;--surface2:#101f33;--surface3:#152540;
  --accent:#06b6d4;--accent2:#0891b2;--accent-glow:rgba(6,182,212,.25);
  --text:#dde7f0;--text-muted:#4d6a85;--border:#1a3050;
  --topbar:rgba(6,13,24,.95);--shadow:rgba(0,0,0,.55);--overlay:rgba(6,13,24,.72);
  --input-bg:#101f33;--popup-bg:#0c1929;--popup-border:#1a3050;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans TC','PingFang TC',sans-serif;background:var(--bg);color:var(--text);}
#map{width:100%;height:100vh;}
.topbar{position:absolute;top:0;left:0;right:0;z-index:1000;
  background:linear-gradient(180deg,var(--topbar) 0%,transparent 100%);
  padding:16px 20px 48px;display:flex;align-items:flex-start;justify-content:space-between;pointer-events:none;}
.logo{pointer-events:all;display:flex;align-items:center;gap:12px;}
.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px var(--accent-glow);}
.logo-text{font-size:17px;font-weight:900;color:var(--text);letter-spacing:-.02em;}
.logo-sub{font-size:10px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.topbar-right{pointer-events:all;display:flex;align-items:center;gap:8px;}
.theme-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.tbtn{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:7px 10px;font-size:13px;transition:all .15s;}
.tbtn.active{background:var(--accent);color:#fff;}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;text-align:center;}
.stat-num{font-size:20px;font-weight:900;color:var(--accent);line-height:1;}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:2px;}
.logout-btn{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  color:var(--text-muted);cursor:pointer;padding:7px 12px;font-size:12px;font-weight:600;
  font-family:inherit;transition:all .15s;}
.logout-btn:hover{border-color:#dc2626;color:#dc2626;}
.legend{position:absolute;bottom:30px;left:18px;z-index:1000;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;}
.legend-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:5px;color:var(--text);}
.legend-item:last-child{margin-bottom:0;}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.action-btn{position:absolute;bottom:16px;right:48px;z-index:1000;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:50px;padding:11px 20px;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 0 20px var(--accent-glow),0 4px 16px var(--shadow);
  transition:all .2s;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.action-btn:hover{transform:translateY(-2px);}
.overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(10px);z-index:2000;
  display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;padding:24px 26px;box-shadow:0 30px 70px var(--shadow);animation:slideUp .22s ease;}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:17px;font-weight:900;color:var(--text);}
.modal-subtitle{font-size:11px;color:var(--accent);margin-top:3px;letter-spacing:.06em;}
.close{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  color:var(--text-muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;}
.close:hover{border-color:var(--accent);color:var(--accent);}
.login-modal{max-width:360px;}
.login-logo{text-align:center;margin-bottom:18px;}
.big-emoji{font-size:48px;display:block;margin-bottom:6px;}
.login-desc{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:20px;line-height:1.7;}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);
  color:var(--text);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.google-btn:hover{border-color:var(--accent);background:var(--surface3);}
.gicon{width:20px;height:20px;flex-shrink:0;}
.fg{margin-bottom:16px;}
.flabel{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;}
.req{color:var(--accent);margin-left:2px;}
.venue-wrap{position:relative;}
.finput{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:9px;
  padding:10px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s;}
.finput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.finput::placeholder{color:var(--text-muted);}
textarea.finput{resize:vertical;min-height:75px;}
.ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 8px 24px var(--shadow);display:none;}
.ac-drop.open{display:block;}
.ac-item{padding:10px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);transition:background .12s;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:var(--surface2);}
.ac-name{font-weight:700;color:var(--text);}
.ac-addr{font-size:11px;color:var(--text-muted);margin-top:2px;}
.ac-msg{padding:10px 13px;font-size:13px;color:var(--text-muted);}
.ac-locked{display:flex;align-items:center;gap:8px;background:rgba(8,145,178,.08);
  border:1px solid rgba(8,145,178,.3);border-radius:9px;padding:9px 12px;font-size:13px;}
.ac-locked-info{flex:1;}
.ac-locked-name{font-weight:700;color:var(--accent);}
.ac-locked-addr{font-size:11px;color:var(--text-muted);margin-top:2px;}
.ac-clear{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0 2px;}
.ac-hint{font-size:11px;margin-top:5px;}
.ac-hint.ok{color:var(--accent);}
.ac-hint.warn{color:#ea580c;}
.choice-group{display:flex;flex-direction:column;gap:6px;}
.choice{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:9px 12px;cursor:pointer;font-size:13px;color:var(--text);
  transition:all .12s;user-select:none;}
.choice:hover{border-color:var(--accent);}
.choice input{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;}
.fdivider{height:1px;background:var(--border);margin:4px 0 16px;}
.rating-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:6px;}
.rating-row{display:flex;gap:6px;}
.rbtn{flex:1;height:42px;border-radius:9px;border:2px solid var(--border);background:var(--surface2);
  color:var(--text-muted);font-size:14px;font-weight:900;cursor:pointer;transition:all .15s;font-family:inherit;}
.rbtn[data-v="1"].active{background:#dc2626;border-color:#dc2626;color:#fff;}
.rbtn[data-v="2"].active{background:#ea580c;border-color:#ea580c;color:#fff;}
.rbtn[data-v="3"].active{background:#ca8a04;border-color:#ca8a04;color:#fff;}
.rbtn[data-v="4"].active{background:#16a34a;border-color:#16a34a;color:#fff;}
.rbtn[data-v="5"].active{background:#06b6d4;border-color:#06b6d4;color:#fff;}
.submit{width:100%;margin-top:4px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:14px;
  font-weight:700;cursor:pointer;transition:all .2s;}
.submit:hover{transform:translateY(-1px);}
.submit:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.confirm-modal{max-width:420px;}
.confirm-block{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.c-venue{font-size:15px;font-weight:900;color:var(--text);margin-bottom:2px;}
.c-addr{font-size:11px;color:var(--text-muted);margin-bottom:10px;}
.c-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:10px;}
.c-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:var(--text-muted);}
.c-row span{color:var(--text);font-weight:600;text-align:right;max-width:58%;}
.c-comment{font-size:12px;color:var(--text-muted);margin-top:8px;padding-top:8px;
  border-top:1px solid var(--border);line-height:1.6;font-style:italic;}
.confirm-notice{font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:14px;line-height:1.6;}
.confirm-btns{display:flex;gap:8px;}
.btn-back{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px;font-family:inherit;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;}
.btn-go{flex:2;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;
  border-radius:10px;padding:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.btn-go:disabled{opacity:.4;cursor:not-allowed;}
.toast{position:fixed;bottom:76px;right:18px;z-index:4000;background:#065f46;border:1px solid #059669;
  color:#d1fae5;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;
  transform:translateY(70px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.err{background:#7f1d1d;border-color:#dc2626;color:#fecaca;}
.toast.show{transform:translateY(0);opacity:1;}
.leaflet-popup-content-wrapper{background:var(--popup-bg)!important;border:1px solid var(--popup-border)!important;
  border-radius:14px!important;box-shadow:0 12px 40px var(--shadow)!important;color:var(--text)!important;padding:0!important;}
.leaflet-popup-tip-container{display:none!important;}
.leaflet-popup-content{margin:0!important;min-width:260px;}
.popup-head{padding:14px 16px 10px;}
.popup-name{font-size:15px;font-weight:900;color:var(--text);margin-bottom:2px;}
.popup-addr{font-size:11px;color:var(--text-muted);}
.popup-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:7px;}
.popup-avg{font-size:11px;color:var(--text-muted);margin-top:5px;}
.popup-avg b{color:var(--accent);}
.popup-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
  border-top:1px solid var(--popup-border);border-bottom:1px solid var(--popup-border);background:var(--surface2);}
.nav-arr{background:none;border:1px solid var(--popup-border);border-radius:6px;color:var(--text);
  cursor:pointer;width:28px;height:28px;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.nav-arr:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.nav-arr:disabled{opacity:.3;cursor:not-allowed;}
.nav-mid{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);}
.nav-in{width:36px;height:26px;background:var(--surface);border:1px solid var(--popup-border);
  border-radius:5px;text-align:center;color:var(--text);font-family:inherit;font-size:12px;font-weight:700;outline:none;}
.nav-in:focus{border-color:var(--accent);}
.popup-body{padding:12px 16px 14px;}
.popup-row{font-size:12px;color:var(--text-muted);margin-bottom:5px;}
.popup-row span{color:var(--text);font-weight:600;}
.popup-comment{font-size:12px;color:var(--text-muted);margin-top:9px;padding-top:9px;
  border-top:1px solid var(--popup-border);line-height:1.6;}
.popup-mod{font-size:11px;color:var(--text-muted);margin-top:10px;padding-top:9px;
  border-top:1px solid var(--popup-border);text-align:center;}
.popup-mod a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
<div id="map"></div>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">🛟</div>
    <div>
      <div class="logo-text">救生員避雷地圖</div>
      <div class="logo-sub">Lifeguard Radar</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="theme-toggle">
      <button class="tbtn" id="btn-light" onclick="setTheme('light')" title="淺色">☀️</button>
      <button class="tbtn" id="btn-dark"  onclick="setTheme('dark')"  title="深色">🌙</button>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">總回報數</div>
    </div>
    <button class="logout-btn" id="logout-btn" onclick="logout()">登出</button>
  </div>
</div>

<div class="legend">
  <div class="legend-title">避雷評分</div>
  <div class="legend-item"><div class="ldot" style="background:#dc2626"></div>1 超雷</div>
  <div class="legend-item"><div class="ldot" style="background:#ea580c"></div>2 偏雷</div>
  <div class="legend-item"><div class="ldot" style="background:#ca8a04"></div>3 普通</div>
  <div class="legend-item"><div class="ldot" style="background:#16a34a"></div>4 不錯</div>
  <div class="legend-item"><div class="ldot" style="background:#06b6d4"></div>5 超推</div>
</div>

<button class="action-btn" id="action-btn" onclick="handleUserBtn()">
  <span id="user-label">登入後回報</span>
</button>

<!-- LOGIN -->
<div class="overlay" id="ov-login" onclick="ovClick(event,'ov-login')">
  <div class="modal login-modal">
    <div class="modal-head">
      <div><div class="modal-title">登入後才能回報</div></div>
      <button class="close" onclick="closeOv('ov-login')">✕</button>
    </div>
    <div class="login-logo"><span class="big-emoji">🛟</span></div>
    <div class="login-desc">
      登入後才能提交回報。<br>每個帳號每個場館只能回報一次。<br>若需修改請聯絡管理員。
    </div>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg class="gicon" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8H6.3C9.6 35.7 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C40.8 36.1 44 30.5 44 24c0-1.3-.1-2.6-.4-3.9z"/>
      </svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<!-- REPORT -->
<div class="overlay" id="ov-report" onclick="ovClick(event,'ov-report')">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title">場館工作內容回報</div>
        <div class="modal-subtitle" id="report-sub">救生員避雷地圖</div>
      </div>
      <button class="close" onclick="closeOv('ov-report')">✕</button>
    </div>
    <div class="fg">
      <label class="flabel">場館名稱或地址<span class="req">*</span></label>
      <div class="venue-wrap">
        <div id="v-locked" style="display:none" class="ac-locked">
          <div class="ac-locked-info">
            <div class="ac-locked-name" id="v-locked-name"></div>
            <div class="ac-locked-addr" id="v-locked-addr"></div>
          </div>
          <button class="ac-clear" onclick="clearVenue()" title="重新選擇">✕</button>
        </div>
        <input id="v-input" class="finput" type="text" autocomplete="off"
          placeholder="搜尋場館名稱，例：南港運動中心"
          oninput="onVI()" onfocus="onVF()">
        <div class="ac-drop" id="ac-drop"></div>
      </div>
      <div class="ac-hint" id="v-hint"></div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">
        找不到場館？可直接在地圖上點選位置 →
        <button onclick="startMapPick()" style="background:none;border:none;color:var(--accent);
          cursor:pointer;font-size:11px;font-weight:700;padding:0;font-family:inherit;">點這裡開啟地圖選點</button>
      </div>
    </div>
    <div class="fdivider"></div>
    <div class="fg">
      <label class="flabel">給薪模式<span class="req">*</span></label>
      <div class="choice-group">
        <label class="choice"><input type="radio" name="pay" value="時薪制"> 時薪制</label>
        <label class="choice"><input type="radio" name="pay" value="月薪制"> 月薪制</label>
      </div>
    </div>
    <div class="fg">
      <label class="flabel">薪資水準<span class="req">*</span></label>
      <input id="f-salary" class="finput" type="text" placeholder="例：時薪 190，或月薪 36,000">
    </div>
    <div class="fdivider"></div>
    <div class="fg">
      <label class="flabel">是否需要負擔雜事<span class="req">*</span></label>
      <div class="choice-group">
        <label class="choice"><input type="checkbox" name="chores" value="無"> 無</label>
        <label class="choice"><input type="checkbox" name="chores" value="清潔場地"> 清潔場地</label>
        <label class="choice"><input type="checkbox" name="chores" value="清潔廁所"> 清潔廁所</label>
        <label class="choice"><input type="checkbox" name="chores" value="機房操作"> 機房操作</label>
        <label class="choice"><input type="checkbox" name="chores" value="加藥"> 加藥</label>
        <label class="choice"><input type="checkbox" name="chores" value="兼任櫃台"> 兼任櫃台</label>
      </div>
      <input id="f-chores-other" class="finput" style="margin-top:7px" type="text" placeholder="其他雜事（選填）">
    </div>
    <div class="fg">
      <label class="flabel">是否常態性獨立當班<span class="req">*</span></label>
      <div class="choice-group">
        <label class="choice"><input type="radio" name="alone" value="是，常需獨自承擔風險"> 是，常需獨自承擔風險</label>
        <label class="choice"><input type="radio" name="alone" value="否，人力符合規定"> 否，人力符合規定</label>
      </div>
    </div>
    <div class="fdivider"></div>
    <div class="fg">

<script>
/* ════════════════════════════════════════
   ★ 填入你的 Supabase 資訊（只需改這兩行）★
════════════════════════════════════════ */
const SUPABASE_URL  = 'https://euinsntybozxjhsddeqm.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_AbidJYNYkRcpXqj49kscCQ_VMWZlx2L';
const GOOGLE_KEY    = 'AIzaSyCq0qDCSrGaH_RYEjc7g0Ny9UQ_12it65k';
/* ════════════════════════════════════════ */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ══ CONSTANTS ══ */
const C = {1:'#dc2626',2:'#ea580c',3:'#ca8a04',4:'#16a34a',5:'#06b6d4'};
const T = {1:'⚡ 超雷',2:'偏雷',3:'普通',4:'不錯',5:'🏊 超推'};

/* ══ STATE ══ */
let theme='light', tile=null, user=null;
let selRating=0, selVenue=null;
let acTimer=null, acResults=[];
const venues  = new Map(); // placeId → {name,address,lat,lon,reports[]}
const markers = new Map(); // placeId → L.Marker
let popIdx=0;

/* ══ MAP ══ */
const TILES = {
  dark:  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
};
const map = L.map('map',{center:[25.047,121.517],zoom:12,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);

function applyTile(dark){
  if(tile) map.removeLayer(tile);
  tile = L.tileLayer(dark?TILES.dark:TILES.light,{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);
}

function setTheme(t){
  theme=t;
  const dark=t==='dark';
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  applyTile(dark);
  ['light','dark'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===t));
}

/* ══ ICON ══ */
function avg(reps){ return reps.reduce((a,r)=>a+r.rating,0)/reps.length; }
function avgClr(reps){ const a=avg(reps); return a<1.5?C[1]:a<2.5?C[2]:a<3.5?C[3]:a<4.5?C[4]:C[5]; }
function mkIcon(reps){
  const col=avgClr(reps);
  const lbl=reps.length===1?String(reps[0].rating):avg(reps).toFixed(1);
  const fs=lbl.length>2?8:11;
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="46" height="56" viewBox="0 0 46 56">
      <filter id="gf"><feGaussianBlur stdDeviation="2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <path d="M23 2C12.5 2 4 10.5 4 21c0 14.5 19 33 19 33S42 35.5 42 21C42 10.5 33.5 2 23 2z"
        fill="${col}" stroke="rgba(255,255,255,.22)" stroke-width="1.5" filter="url(#gf)"/>
      <circle cx="23" cy="20" r="10" fill="rgba(0,0,0,.2)"/>
      <text x="23" y="25" text-anchor="middle" fill="white"
        font-size="${fs}" font-weight="900" font-family="'Noto Sans TC',sans-serif">${lbl}</text>
    </svg>`,
    className:'',iconSize:[46,56],iconAnchor:[23,56],popupAnchor:[0,-58]
  });
}

/* ══ POPUP ══ */
function popHTML(pid, idx){
  const v=venues.get(pid), r=v.reports[idx], tot=v.reports.length;
  const col=C[r.rating];
  const chores=r.chores&&r.chores.length?r.chores.join('、'):'無';
  const avgStr=tot>1?`<div class="popup-avg">共 ${tot} 筆 · 平均 <b>${avg(v.reports).toFixed(1)}</b> 分</div>`:'';
  const navBar=`<div class="popup-nav">
    <button class="nav-arr" ${idx===0?'disabled':''} onclick="popNav('${pid}',-1)">‹</button>
    <div class="nav-mid">第&nbsp;<input class="nav-in" type="number" min="1" max="${tot}" value="${idx+1}"
      onchange="popJump('${pid}',this.value)">&nbsp;筆
      <span style="color:var(--text-muted)">/ ${tot}</span></div>
    <button class="nav-arr" ${idx===tot-1?'disabled':''} onclick="popNav('${pid}',1)">›</button>
  </div>`;
  return `<div class="popup-head">
    <div class="popup-name">${v.name}</div>
    <div class="popup-addr">📍 ${v.address}</div>
    <div class="popup-badge" style="background:${col}20;color:${col};border:1px solid ${col}40">評分 ${r.rating}・${T[r.rating]}</div>
    ${avgStr}</div>
  ${tot>1?navBar:''}
  <div class="popup-body">
    <div class="popup-row">💰 給薪：<span>${r.pay_type}　${r.salary}</span></div>
    <div class="popup-row">🧹 雜事：<span>${chores}</span></div>
    <div class="popup-row">👤 獨立當班：<span>${r.alone}</span></div>
    ${r.comment?`<div class="popup-comment">💬 ${r.comment}</div>`:''}
    <div class="popup-mod">若需修改，請 <a href="mailto:admin@example.com">聯絡管理員</a></div>
  </div>`;
}

function openPopup(pid,idx){
  popIdx=idx;
  const mk=markers.get(pid);
  if(!mk) return;
  mk.setPopupContent(popHTML(pid,idx));
  mk.openPopup();
}
function popNav(pid,dir){
  const v=venues.get(pid);
  popIdx=Math.max(0,Math.min(v.reports.length-1,popIdx+dir));
  markers.get(pid).setPopupContent(popHTML(pid,popIdx));
}
function popJump(pid,val){
  const n=parseInt(val)-1; if(isNaN(n)) return;
  const v=venues.get(pid);
  popIdx=Math.max(0,Math.min(v.reports.length-1,n));
  markers.get(pid).setPopupContent(popHTML(pid,popIdx));
}

/* ══ ADD ROW TO MAP ══ */
function addRowToMap(row){
  const pid=row.place_id;
  if(!venues.has(pid)){
    venues.set(pid,{name:row.place_name,address:row.address,lat:row.lat,lon:row.lon,reports:[]});
  }
  const v=venues.get(pid);
  // avoid duplicates on reload
  if(!v.reports.find(r=>r.id===row.id)) v.reports.push(row);

  if(markers.has(pid)){
    markers.get(pid).setIcon(mkIcon(v.reports));
  } else {
    const mk=L.marker([v.lat,v.lon],{icon:mkIcon(v.reports)}).addTo(map);
    mk.bindPopup('',{maxWidth:300});
    mk.on('click',()=>openPopup(pid,0));
    markers.set(pid,mk);
  }
  updateStats();
}

/* ══ LOAD APPROVED REPORTS ══ */
async function loadReports(){
  const {data,error}=await sb.from('reports').select('*').eq('status','approved');
  if(error){ console.error('載入回報失敗',error); return; }
  data.forEach(addRowToMap);
}

/* ══ AUTH ══ */
function handleUserBtn(){
  if(user) tryReport(); else openOv('ov-login');
}

async function loginWithGoogle(){
  const {error}=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: window.location.href }
  });
  if(error) showToast('登入失敗：'+error.message,'err');
}

// 監聽登入狀態（頁面載入 + OAuth redirect 回來都會觸發）
sb.auth.onAuthStateChange((event, session)=>{
  if(session?.user){
    const u=session.user;
    user = { id: u.id, name: u.user_metadata?.full_name || u.email };
    document.getElementById('user-label').textContent='立即回報';
    document.getElementById('logout-btn').style.display='block';
    closeOv('ov-login');
    // 只在真正完成 OAuth 登入時才顯示歡迎（不在頁面重整時重複顯示）
    if(event==='SIGNED_IN' && !sessionStorage.getItem('welcomed')){
      sessionStorage.setItem('welcomed','1');
      showToast('👋 歡迎，'+user.name+'！');
    }
  } else {
    user=null;
    sessionStorage.removeItem('welcomed');
    document.getElementById('user-label').textContent='登入後回報';
    document.getElementById('logout-btn').style.display='none';
  }
});

async function logout(){
  await sb.auth.signOut();
  showToast('已登出');
}

/* ══ VENUE AUTOCOMPLETE ══ */
function onVI(){
  clearTimeout(acTimer);
  const q=document.getElementById('v-input').value.trim();
  const drop=document.getElementById('ac-drop');
  if(q.length<2){ drop.classList.remove('open'); return; }
  drop.innerHTML='<div class="ac-msg">🔍 搜尋中...</div>';
  drop.classList.add('open');
  acTimer=setTimeout(()=>fetchAC(q),500);
}
function onVF(){
  const q=document.getElementById('v-input').value.trim();
  if(q.length>=2) fetchAC(q);
}
async function fetchAC(q){
  try{
    // Google Places API (New) — Autocomplete，限制台灣地區
    const res=await fetch('https://places.googleapis.com/v1/places:autocomplete',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Goog-Api-Key':GOOGLE_KEY},
      body:JSON.stringify({
        input: q,
        includedRegionCodes: ['tw'],
        languageCode: 'zh-TW'
      })
    });
    const data=await res.json();
    acResults=data.suggestions||[];
    renderAC();
  }catch{ document.getElementById('ac-drop').classList.remove('open'); }
}
function renderAC(){
  const drop=document.getElementById('ac-drop');
  if(!acResults.length){
    drop.innerHTML='<div class="ac-msg">找不到符合地點，可嘗試簡化關鍵字，或點下方「地圖選點」</div>'; return;
  }
  drop.innerHTML=acResults.map((s,i)=>{
    const p=s.placePrediction;
    const main=p.structuredFormat?.mainText?.text||p.text.text.split(',')[0];
    const sub=p.structuredFormat?.secondaryText?.text||'';
    return `<div class="ac-item" onclick="pickVenue(${i})">
      <div class="ac-name">${main}</div>
      ${sub?`<div class="ac-addr">${sub}</div>`:''}
    </div>`;
  }).join('');
}
async function pickVenue(i){
  const p=acResults[i].placePrediction;
  const placeId=p.placeId;
  const main=p.structuredFormat?.mainText?.text||p.text.text.split(',')[0];
  const sub=p.structuredFormat?.secondaryText?.text||p.text.text;

  // 先鎖定顯示，再非同步查座標
  document.getElementById('v-input').style.display='none';
  document.getElementById('v-locked-name').textContent=main;
  document.getElementById('v-locked-addr').textContent=sub;
  document.getElementById('v-locked').style.display='flex';
  document.getElementById('ac-drop').classList.remove('open');
  document.getElementById('v-hint').textContent='🔍 正在取得座標...';
  document.getElementById('v-hint').className='ac-hint';

  try{
    // 取得精確座標
    const res=await fetch(
      `https://places.googleapis.com/v1/places/${placeId}?fields=location,displayName,formattedAddress`,
      {headers:{'X-Goog-Api-Key':GOOGLE_KEY,'X-Goog-FieldMask':'location,displayName,formattedAddress'}}
    );
    const d=await res.json();
    selVenue={
      placeId,
      name:     d.displayName?.text||main,
      address:  d.formattedAddress||sub,
      lat:      d.location.latitude,
      lon:      d.location.longitude
    };
    document.getElementById('v-locked-name').textContent=selVenue.name;
    document.getElementById('v-locked-addr').textContent=selVenue.address;
    checkDup();
  }catch{
    showToast('取得座標失敗，請重試','err');
    clearVenue();
  }
}

/* ══ MAP PICK MODE ══ */
let mapPickMode=false;
function startMapPick(){
  closeOv('ov-report');
  mapPickMode=true;
  showToast('請點選地圖上的場館位置');
  map.getContainer().style.cursor='crosshair';
  // 提示覆蓋層
  document.getElementById('map-pick-hint').style.display='flex';
}
function cancelMapPick(){
  mapPickMode=false;
  map.getContainer().style.cursor='';
  document.getElementById('map-pick-hint').style.display='none';
  openOv('ov-report');
}
map.on('click',async function(e){
  document.getElementById('ac-drop').classList.remove('open');
  if(!mapPickMode) return;
  mapPickMode=false;
  map.getContainer().style.cursor='';
  document.getElementById('map-pick-hint').style.display='none';

  const {lat,lng}=e.latlng;
  // 反查地址（reverse geocoding）
  showToast('正在查詢位置資訊...');
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&namedetails=1&accept-language=zh-TW`);
    const d=await r.json();
    const name=d.namedetails?.name||d.display_name.split(',')[0];
    const parts=d.display_name.split(',').map(s=>s.trim()).filter(s=>s&&s!=='台灣'&&s!=='Taiwan');
    const shortAddr=parts.slice(0,3).join('、');
    selVenue={placeId:'custom_'+lat.toFixed(5)+'_'+lng.toFixed(5),name,address:shortAddr,lat,lon:lng};
    document.getElementById('v-input').style.display='none';
    document.getElementById('v-locked-name').textContent=name;
    document.getElementById('v-locked-addr').textContent=shortAddr;
    document.getElementById('v-locked').style.display='flex';
    document.getElementById('v-hint').textContent='✅ 已標記地圖位置';
    document.getElementById('v-hint').className='ac-hint ok';
  }catch{
    showToast('查詢位置失敗，請重試','err');
  }
  openOv('ov-report');
});
function clearVenue(){
  selVenue=null;
  document.getElementById('v-input').style.display='';
  document.getElementById('v-input').value='';
  document.getElementById('v-locked').style.display='none';
  document.getElementById('v-hint').textContent='';
  document.getElementById('v-hint').className='ac-hint';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('ac-drop').classList.remove('open');
}
async function checkDup(){
  if(!user||!selVenue) return;
  const hint=document.getElementById('v-hint');
  // 查詢此用戶是否已對此場館回報過
  const {data}=await sb.from('reports')
    .select('id').eq('user_id',user.id).eq('place_id',selVenue.placeId).limit(1);
  if(data&&data.length>0){
    hint.textContent='⚠️ 你已回報過此場館，每個場館只能回報一次，若需修改請聯絡管理員';
    hint.className='ac-hint warn';
    document.getElementById('submit-btn').disabled=true;
  } else {
    hint.textContent='✅ 已選取場館位置，確認無誤後繼續填寫';
    hint.className='ac-hint ok';
    document.getElementById('submit-btn').disabled=false;
  }
}

/* ══ REPORT FLOW ══ */
function tryReport(){
  if(!user){ openOv('ov-login'); return; }
  document.getElementById('report-sub').textContent='回報者：'+user.name;
  openOv('ov-report');
}
function setRating(v){
  selRating=v;
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.toggle('active',+b.dataset.v===v));
}
function openConfirm(){
  if(!selVenue) return toast('請先選擇場館','err');
  const pay=document.querySelector('input[name="pay"]:checked')?.value;
  const salary=document.getElementById('f-salary').value.trim();
  const alone=document.querySelector('input[name="alone"]:checked')?.value;
  const chores=[...document.querySelectorAll('input[name="chores"]:checked')].map(c=>c.value);
  const co=document.getElementById('f-chores-other').value.trim();
  if(co) chores.push(co);
  const comment=document.getElementById('f-comment').value.trim();

  if(!pay)          return toast('請選擇給薪模式','err');
  if(!salary)       return toast('請填寫薪資水準','err');
  if(!chores.length)return toast('請選擇雜事負擔情形','err');
  if(!alone)        return toast('請選擇是否獨立當班','err');
  if(!selRating)    return toast('請選擇整體評分','err');

  const col=C[selRating];
  document.getElementById('c-name').textContent=selVenue.name;
  document.getElementById('c-addr').textContent=selVenue.address;
  const badge=document.getElementById('c-badge');
  badge.textContent=`評分 ${selRating}・${T[selRating]}`;
  badge.style.cssText=`background:${col}20;color:${col};border:1px solid ${col}40`;
  document.getElementById('c-pay').textContent=pay;
  document.getElementById('c-salary').textContent=salary;
  document.getElementById('c-chores').textContent=chores.join('、');
  document.getElementById('c-alone').textContent=alone;
  const cc=document.getElementById('c-comment');
  if(comment){cc.textContent='💬 '+comment;cc.style.display='';}else{cc.style.display='none';}

  window._p={pay,salary,chores,alone,comment,anon:document.getElementById('f-anon').checked};
  openOv('ov-confirm');
}

async function submitReport(){
  const p=window._p;
  if(!p||!selVenue||!user) return;

  const goBtn=document.getElementById('confirm-go');
  goBtn.disabled=true; goBtn.textContent='送出中...';

  const {error}=await sb.from('reports').insert({
    user_id:    user.id,
    user_name:  p.anon ? '匿名' : user.name,
    place_id:   selVenue.placeId,
    place_name: selVenue.name,
    address:    selVenue.address,
    lat:        selVenue.lat,
    lon:        selVenue.lon,
    pay_type:   p.pay,
    salary:     p.salary,
    chores:     p.chores,
    alone:      p.alone,
    rating:     selRating,
    comment:    p.comment,
    status:     'pending'   // 需管理員審核才上架
  });

  goBtn.disabled=false; goBtn.textContent='確認送出';

  if(error){
    showToast('送出失敗：'+error.message,'err'); return;
  }

  closeOv('ov-confirm'); closeOv('ov-report');
  showToast('✅ 回報已送出，待管理員審核後顯示於地圖！');
  resetForm();
}

function resetForm(){
  selRating=0; selVenue=null; window._p=null;
  clearVenue();
  ['f-salary','f-comment','f-chores-other'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-anon').checked=false;
  document.querySelectorAll('input[name="pay"],input[name="alone"],input[name="chores"]')
    .forEach(el=>el.checked=false);
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('submit-btn').disabled=false;
}

function updateStats(){
  let t=0; venues.forEach(v=>t+=v.reports.length);
  document.getElementById('stat-total').textContent=t;
}

/* ══ OVERLAY ══ */
function openOv(id){ document.getElementById(id).classList.add('open'); }
function closeOv(id){ document.getElementById(id).classList.remove('open'); }
function ovClick(e,id){ if(e.target.id===id) closeOv(id); }

/* ══ TOAST ══ */
function showToast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast'+(type?' '+type:'');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3200);
}
function toast(msg,type){ showToast(msg,type); }

/* ══ INIT ══ */
setTheme('light');
map.on('click',()=>document.getElementById('ac-drop').classList.remove('open'));

function alignActionBtn(){
  const zoom=document.querySelector('.leaflet-control-zoom');
  const btn=document.getElementById('action-btn');
  if(!zoom||!btn) return;
  const zr=zoom.getBoundingClientRect(), br=btn.getBoundingClientRect();
  btn.style.top=zr.top+(zr.height-br.height)/2+'px';
  btn.style.bottom='auto';
}
map.whenReady(()=>{ setTimeout(alignActionBtn,100); });
window.addEventListener('resize',alignActionBtn);

// 載入已審核回報 + 等地圖 ready
loadReports();
</script>
